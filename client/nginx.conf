server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 26m;

    # The browser calls the API at its own origin; Nginx forwards it to the
    # separate gateway container on the internal Docker network.
    location /v1/ {
        proxy_pass http://gateway:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /health {
        proxy_pass http://gateway:5000;
        proxy_http_version 1.1;
    }

    # Serve the public logo as a real static file. Without this exact match,
    # a missing image path can fall through to index.html with HTTP 200, which
    # browsers display as a broken image instead of an obvious 404.
    location = /mblob.png {
        try_files /mblob.png =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Support client-side routes such as /upload and /retrieve.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
